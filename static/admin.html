<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 自用图床</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .logo p {
            color: #aaa;
            font-size: 0.9rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .user-name {
            font-weight: 500;
        }
        .logout-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .logout-btn:hover {
            background: #333;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .nav a {
            color: #aaa;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover {
            background: #222;
            color: #fff;
        }
        .nav a.active {
            background: #fff;
            color: #000;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
        }
        .stat-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #aaa;
            font-size: 0.9rem;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 400;
        }
        .refresh-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .refresh-btn:hover {
            background: #333;
        }
        .table-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #1a1a1a;
            color: #aaa;
            font-weight: 500;
            font-size: 0.9rem;
        }
        tr:hover {
            background: #1a1a1a;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge.admin {
            background: #003;
            color: #66f;
            border: 1px solid #66f;
        }
        .badge.user {
            background: #030;
            color: #6f6;
            border: 1px solid #6f6;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-danger {
            background: #300;
            color: #f66;
            border: 1px solid #600;
        }
        .btn-danger:hover {
            opacity: 0.8;
        }
        .btn-admin {
            background: #003;
            color: #66f;
            border: 1px solid #66f;
        }
        .btn-admin:hover {
            opacity: 0.8;
        }
        .btn-user {
            background: #030;
            color: #6f6;
            border: 1px solid #6f6;
        }
        .btn-user:hover {
            opacity: 0.8;
        }
        .thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: #111;
            color: #fff;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.success {
            background: #030;
            border-color: #060;
            color: #6f6;
        }
        .toast.error {
            background: #300;
            border-color: #600;
            color: #f66;
        }
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }
            .stats-cards {
                grid-template-columns: 1fr;
            }
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>⚙️ 后台管理</h1>
                <p>管理员控制面板</p>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <div>
                    <div class="user-name" id="userName">管理员</div>
                    <div style="color: #666; font-size: 0.8rem;" id="userRole">管理员</div>
                </div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        
        <nav class="nav">
            <a href="/" class="active">📊 仪表盘</a>
            <a href="/manage">📁 文件管理</a>
            <a href="/">🏠 返回首页</a>
        </nav>
        
        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="userCount">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <div class="stat-value" id="fileCount">0</div>
                <div class="stat-label">总文件数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💾</div>
                <div class="stat-value" id="totalSize">0</div>
                <div class="stat-label">总存储空间</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👑</div>
                <div class="stat-value" id="adminCount">0</div>
                <div class="stat-label">管理员数</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">用户管理</h2>
                <button class="refresh-btn" onclick="loadUsers()">刷新</button>
            </div>
            <div class="table-container">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>注册时间</th>
                            <th>角色</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 用户数据将通过JavaScript填充 -->
                    </tbody>
                </table>
                <div id="usersEmpty" class="empty-state" style="display: none;">暂无用户数据</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">文件管理</h2>
                <button class="refresh-btn" onclick="loadFiles()">刷新</button>
            </div>
            <div class="table-container">
                <table id="filesTable">
                    <thead>
                        <tr>
                            <th>预览</th>
                            <th>文件名</th>
                            <th>原始名</th>
                            <th>上传者</th>
                            <th>大小</th>
                            <th>上传时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 文件数据将通过JavaScript填充 -->
                    </tbody>
                </table>
                <div id="filesEmpty" class="empty-state" style="display: none;">暂无文件数据</div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        let currentUser = null;
        const toast = document.getElementById('toast');

        // 显示通知
        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 获取认证token
        function getAuthToken() {
            return localStorage.getItem('token');
        }

        // 检查登录状态
        function checkAuth() {
            const token = getAuthToken();
            if (!token) {
                window.location.href = '/login';
                return false;
            }
            return true;
        }

        // 检查管理员权限
        function checkAdmin() {
            const userJson = localStorage.getItem('user');
            if (!userJson) return false;
            
            const user = JSON.parse(userJson);
            return user.is_admin === true || user.is_admin === 1;
        }

        // 加载用户信息
        function loadUserInfo() {
            const userJson = localStorage.getItem('user');
            if (userJson) {
                const user = JSON.parse(userJson);
                currentUser = user;
                document.getElementById('userName').textContent = user.username;
                document.getElementById('userRole').textContent = user.is_admin ? '管理员' : '普通用户';
                document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
            }
        }

        // 加载统计信息
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });
                
                if (response.status === 403) {
                    showToast('需要管理员权限', 'error');
                    window.location.href = '/';
                    return;
                }
                
                if (!response.ok) throw new Error('获取统计信息失败');
                
                const data = await response.json();
                document.getElementById('userCount').textContent = data.user_count;
                document.getElementById('fileCount').textContent = data.file_count;
                document.getElementById('totalSize').textContent = data.total_size_formatted;
                
                // 计算管理员数（需要从用户列表中获取）
                const usersResponse = await fetch('/api/admin/users', {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });
                if (usersResponse.ok) {
                    const users = await usersResponse.json();
                    const adminCount = users.filter(u => u.is_admin).length;
                    document.getElementById('adminCount').textContent = adminCount;
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
                showToast('加载统计信息失败', 'error');
            }
        }

        // 加载用户列表
        async function loadUsers() {
            const tableBody = document.querySelector('#usersTable tbody');
            const emptyState = document.getElementById('usersEmpty');
            
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">加载中...</td></tr>';
            
            try {
                const response = await fetch('/api/admin/users', {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });
                
                if (!response.ok) throw new Error('获取用户列表失败');
                
                const users = await response.json();
                
                if (users.length === 0) {
                    tableBody.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                
                emptyState.style.display = 'none';
                tableBody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${new Date(user.created_at * 1000).toLocaleString('zh-CN')}</td>
                        <td>
                            <span class="badge ${user.is_admin ? 'admin' : 'user'}">
                                ${user.is_admin ? '管理员' : '普通用户'}
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                ${user.id !== currentUser.id ? `
                                    ${user.is_admin ? 
                                        `<button class="btn btn-user" onclick="setAdminStatus(${user.id}, false)">设为用户</button>` : 
                                        `<button class="btn btn-admin" onclick="setAdminStatus(${user.id}, true)">设为管理员</button>`
                                    }
                                    <button class="btn btn-danger" onclick="deleteUser(${user.id})">删除</button>
                                ` : '<span style="color: #666;">当前用户</span>'}
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载用户列表失败:', error);
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #f66;">加载失败</td></tr>';
                showToast('加载用户列表失败', 'error');
            }
        }

        // 加载文件列表
        async function loadFiles() {
            const tableBody = document.querySelector('#filesTable tbody');
            const emptyState = document.getElementById('filesEmpty');
            
            tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">加载中...</td></tr>';
            
            try {
                const response = await fetch('/api/admin/all-files', {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });
                
                if (!response.ok) throw new Error('获取文件列表失败');
                
                const files = await response.json();
                
                if (files.length === 0) {
                    tableBody.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                
                emptyState.style.display = 'none';
                tableBody.innerHTML = files.map(file => `
                    <tr>
                        <td>
                            <img class="thumbnail" src="${file.url}" alt="${file.filename}" onerror="this.style.display='none'">
                        </td>
                        <td>${file.filename}</td>
                        <td>${file.original_name}</td>
                        <td>${file.username || '未知用户'}</td>
                        <td>${formatFileSize(file.size)}</td>
                        <td>${new Date(file.uploaded_at * 1000).toLocaleString('zh-CN')}</td>
                        <td>
                            <div class="action-buttons">
                                <a href="${file.url}" target="_blank" style="color: #66f; margin-right: 10px;">查看</a>
                                <button class="btn btn-danger" onclick="deleteFile(${file.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载文件列表失败:', error);
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: #f66;">加载失败</td></tr>';
                showToast('加载文件列表失败', 'error');
            }
        }

        // 设置用户管理员状态
        async function setAdminStatus(userId, isAdmin) {
            if (!confirm(`确定要将该用户${isAdmin ? '设为管理员' : '设为普通用户'}吗？`)) return;
            
            try {
                const formData = new FormData();
                formData.append('is_admin', isAdmin);
                
                const response = await fetch(`/api/admin/users/${userId}/admin`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    },
                    body: formData
                });
                
                if (!response.ok) throw new Error('设置失败');
                
                showToast(`用户权限已${isAdmin ? '提升为管理员' : '降级为普通用户'}`, 'success');
                loadUsers();
                loadStats(); // 重新加载统计信息
            } catch (error) {
                console.error('设置管理员状态失败:', error);
                showToast('设置失败', 'error');
            }
        }

        // 删除用户
        async function deleteUser(userId) {
            if (!confirm('确定要删除该用户吗？此操作将同时删除该用户的所有文件，且不可恢复。')) return;
            
            try {
                const response = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });
                
                if (!response.ok) throw new Error('删除失败');
                
                showToast('用户已删除', 'success');
                loadUsers();
                loadStats();
                loadFiles(); // 重新加载文件列表，因为可能删除了相关文件
            } catch (error) {
                console.error('删除用户失败:', error);
                showToast('删除失败', 'error');
            }
        }

        // 删除文件
        async function deleteFile(fileId) {
            if (!confirm('确定要删除该文件吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`/api/admin/files/${fileId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });
                
                if (!response.ok) throw new Error('删除失败');
                
                showToast('文件已删除', 'success');
                loadFiles();
                loadStats();
            } catch (error) {
                console.error('删除文件失败:', error);
                showToast('删除失败', 'error');
            }
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + units[i];
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        // 初始化
        async function init() {
            if (!checkAuth()) return;
            
            if (!checkAdmin()) {
                showToast('需要管理员权限', 'error');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                return;
            }
            
            loadUserInfo();
            loadStats();
            loadUsers();
            loadFiles();
        }

        // 页面加载时初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
